name: Preview Corpus Nightly

# Phase 7 — Regression governance. Runs the golden corpus on a nightly
# schedule and produces a metrics summary that the dashboard ingests. The
# job is also wired into PR builds (manual trigger only) so a reviewer can
# eyeball whether a template/prompt change moved the regression needle.

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC nightly
  workflow_dispatch:
    inputs:
      include_shadow:
        description: "Include shadow corpus rotation"
        required: false
        default: "false"
      max_urls:
        description: "Cap number of URLs (0 = all)"
        required: false
        default: "0"

jobs:
  run-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: ${{ github.workspace }}
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi
          pip install pytest

      - name: Run preview engine unit tests (gate)
        run: pytest -q backend/tests/test_preview_engine_plan.py

      - name: Run golden corpus
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.include_shadow }}" = "true" ]; then
            ARGS="$ARGS --include-shadow"
          fi
          if [ -n "${{ github.event.inputs.max_urls }}" ] && [ "${{ github.event.inputs.max_urls }}" != "0" ]; then
            ARGS="$ARGS --max-urls ${{ github.event.inputs.max_urls }}"
          fi
          python -m backend.scripts.preview_engine.run_corpus \
              --output-dir artifacts/baseline \
              --quality-mode balanced \
              --workers 2 \
              $ARGS

      - name: Enforce regression gate
        run: |
          python - <<'PY'
          import json, glob, os, sys
          summaries = sorted(glob.glob("artifacts/baseline/*/SUMMARY.json"))
          if not summaries:
              print("No SUMMARY.json produced — corpus did not run", file=sys.stderr)
              sys.exit(1)
          latest = json.loads(open(summaries[-1]).read())
          # Plan-mandated regression gate (Phase 7 exit gate).
          checks = {
              "success_rate>=0.95": latest.get("success_rate", 0) >= 0.95,
              "title_fidelity>=0.70": latest.get("title_fidelity", 0) >= 0.70,
              "default_palette_incidence<=0.40": latest.get("default_palette_incidence", 1) <= 0.40,
          }
          for label, ok in checks.items():
              print(f"{label}: {'PASS' if ok else 'FAIL'}")
          if not all(checks.values()):
              sys.exit(1)
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-baseline
          path: artifacts/baseline
          retention-days: 30
